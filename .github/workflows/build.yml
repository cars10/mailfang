name: build and push

on:
  workflow_dispatch:

  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.package-version.outputs.current-version }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: martinbeentjes/npm-get-version-action@v1.3.1
        id: package-version
        with:
          path: frontend

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          tags: |
            cars10/mailfang:latest
            ghcr.io/cars10/mailfang:latest
            cars10/mailfang:${{ steps.package-version.outputs.current-version }}
            ghcr.io/cars10/mailfang:${{ steps.package-version.outputs.current-version }}

      - name: extract binary from image
        run: |
          docker create --name extract cars10/mailfang:${{ steps.package-version.outputs.current-version }}
          docker cp extract:/usr/bin/mailfang ./mailfang-linux-amd64
          docker rm extract
          chmod +x ./mailfang-linux-amd64

      - name: Upload Linux binary
        uses: actions/upload-artifact@v6
        with:
          name: mailfang-linux-amd64
          path: ./mailfang-linux-amd64
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            asset: macos-x86_64
          - target: aarch64-apple-darwin
            asset: macos-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Rust toolchain (rustup)
        run: |
          rustup toolchain install stable
          rustup target add "${{ matrix.target }}"

      - name: Build MailFang binary (macOS)
        run: |
          cd backend
          cargo build --release --features embed-frontend --target "${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/mailfang" "../mailfang-${{ matrix.asset }}"
          chmod +x "../mailfang-${{ matrix.asset }}"

      - name: Upload macOS binary
        uses: actions/upload-artifact@v6
        with:
          name: mailfang-${{ matrix.asset }}
          path: ./mailfang-${{ matrix.asset }}
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
    permissions:
      contents: write
    env:
      TAG: v${{ needs.build-linux.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: mailfang-linux-amd64
          path: dist/mailfang-linux-amd64

      - name: Download macOS Intel binary
        uses: actions/download-artifact@v8
        with:
          name: mailfang-macos-x86_64
          path: dist/mailfang-macos-x86_64

      - name: Download macOS Apple Silicon binary
        uses: actions/download-artifact@v8
        with:
          name: mailfang-macos-arm64
          path: dist/mailfang-macos-arm64

      - name: Extract changelog for release body
        id: changelog
        run: |
          BODY="$(awk 'found && /^## [0-9]/ { exit } /^## [0-9]/ { found=1 } found' CHANGELOG.md | sed '/^[[:space:]]*$/d')"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body: ${{ steps.changelog.outputs.body }}
          artifacts: |
            dist/mailfang-linux-amd64/mailfang-linux-amd64
            dist/mailfang-macos-x86_64/mailfang-macos-x86_64
            dist/mailfang-macos-arm64/mailfang-macos-arm64
          allowUpdates: true
          replacesArtifacts: true

      - name: deploy
        run: |
          curl -X POST https://autodok.cars10k.de/update \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ secrets.AUTODOK_API_KEY }}" \
            -d '{"container": "mailfang", "image": "cars10/mailfang:latest"}'
